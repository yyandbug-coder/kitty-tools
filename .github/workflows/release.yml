# 发布 Kitty Tools 安装包与自动更新清单
#
# 触发方式：推送 tag（例如 v0.1.0）
# 前置 Secret：
#   TAURI_SIGNING_PRIVATE_KEY — 更新包签名私钥（内容或文件路径）
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — 私钥密码（可选）
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*
            src-tauri/target/release/bundle/**/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.sig' -o -name '*.tar.gz' -o -name '*.AppImage' \) -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Generate latest.json
        env:
          RELEASE_BASE_URL: https://api.gitcode.com/api/v5/repos/yyandbug/kitty-tools/releases/${{ github.ref_name }}/attach_files
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/updater-skill.mjs generate-latest-json.mjs --version "$VERSION" --notes "Release $GITHUB_REF_NAME" --bundle-root artifacts

      - name: Upload latest.json to release assets
        run: cp releases/latest.json release-assets/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
